# Zenn 記事バックログ定義ファイル
#
# CoWork が毎日このファイルを読み、「今日やること」が空のときに記事タスクを補充する。
# - status: draft   → まだ書いていない / 書きかけ
# - status: review  → ドラフト完成済み・投稿判断待ち
# - status: done    → Zenn に投稿済み（ここに残しておくと重複防止になる）
#
# 使い方:
#   1. articles: リストに追加する（status: draft で追加）
#   2. ドラフトが完成したら status を review に変更する
#   3. 投稿したら status を done に変更する
#
# CoWork の補充ルール:
#   - status: draft の先頭1件を「今日やること」に追加する
#   - status: review のものは「Zenn 記事投稿判断」タスクとして追加する

